<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1C23" />
      <stop offset="100%" stop-color="#090A0F" />
    </linearGradient>

    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#0066FF" />
    </linearGradient>

    <linearGradient id="button-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A3E4A" />
      <stop offset="100%" stop-color="#22242A" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg-grad)" stroke="#2A2D35" stroke-width="4"/>

  <rect x="224" y="64" width="64" height="40" rx="12" fill="url(#button-grad)"/>
  <rect x="236" y="48" width="40" height="24" rx="8" fill="#00F0FF" filter="url(#glow)"/>

  <circle cx="256" cy="280" r="140" fill="none" stroke="#1F222B" stroke-width="32" />

  <path d="M 256 140 A 140 140 0 0 1 377 350" fill="none" stroke="url(#cyan-glow)" stroke-width="32" stroke-linecap="round" filter="url(#glow)"/>

  <path d="M 230 230 L 180 280 L 230 330" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  
  <path d="M 282 230 L 332 280 L 282 330" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  
  <circle cx="256" cy="280" r="12" fill="#00F0FF" filter="url(#glow)"/>
</svg>
